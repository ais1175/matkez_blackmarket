<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="a.css">
</head>
<body>
    <div id="blackcont">
        <div id="itemswrapper">
            <div class="top">
                <span id="blackname" class="toplabel">Black Market</span>
            </div>
            <div id="blackitems" class="itemslist"></div>
            <div id="searchwrapp">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M480 272C480 317.9 465.1 360.3 440 394.7L566.6 521.4C579.1 533.9 579.1 554.2 566.6 566.7C554.1 579.2 533.8 579.2 521.3 566.7L394.7 440C360.3 465.1 317.9 480 272 480C157.1 480 64 386.9 64 272C64 157.1 157.1 64 272 64C386.9 64 480 157.1 480 272zM272 416C351.5 416 416 351.5 416 272C416 192.5 351.5 128 272 128C192.5 128 128 192.5 128 272C128 351.5 192.5 416 272 416z"/></svg>
                <input id="search" type="search" placeholder="Search">
            </div>
        </div>
        <div id="cartwrapper">
            <div class="top">
                <span id="cartlabel" class="toplabel">Cart</span>
            </div>
            <div id="cartitems" class="itemslist"></div>
            <div id="orderwrp">
                <div id="totalwrapper"></div>
                <button id="order" onclick="order()">ORDER</button>
            </div>
        </div>
        <div id="levelwrap">
            <span id="levellabel">LEVEL</span>
            <div id="level">
                <span id="leveln">3</span>
            </div>
            <div id="progresswrp">
                <span id="xp">200/350 XP</span>
                <div id="progress">
                    <div id="filler"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="a.js"></script>
</body>
</html>
